openapi: 3.0.3
info:
  title: Backlog API
  version: 2.0.0
  description: Backlog API specification for backlog-cli
servers:
- url: https://{space}.{domain}/api/v2
  variables:
    space:
      default: example
      description: Space Key
    domain:
      default: backlog.com
      description: Domain (backlog.com or backlog.jp)
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/OAuth2AccessRequest.action
          tokenUrl: https://example.com/api/v2/oauth2/token
          scopes: {}
    ApiKey:
      type: apiKey
      in: query
      name: apiKey
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        roleType:
          type: integer
        lang:
          type: string
        mailAddress:
          type: string
        nulabAccount:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/NulabAccount'
        lastLoginTime:
          type: string
    NulabAccount:
      type: object
      properties:
        nulabId:
          type: string
        name:
          type: string
        uniqueId:
          type: string
    Project:
      type: object
      properties:
        id:
          type: integer
        projectKey:
          type: string
        name:
          type: string
        chartEnabled:
          type: boolean
        useResolvedForChart:
          type: boolean
        subtaskingEnabled:
          type: boolean
        projectLeaderCanEditProjectLeader:
          type: boolean
        useWiki:
          type: boolean
        useFileSharing:
          type: boolean
        useWikiTreeView:
          type: boolean
        useOriginalImageSizeAtWiki:
          type: boolean
        textFormattingRule:
          type: string
        archived:
          type: boolean
        displayOrder:
          type: integer
        useDevAttributes:
          type: boolean
    IssueType:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        color:
          type: string
        displayOrder:
          type: integer
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        displayOrder:
          type: integer
    Version:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        releaseDueDate:
          type: string
          nullable: true
        archived:
          type: boolean
        displayOrder:
          type: integer
    Status:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        color:
          type: string
        displayOrder:
          type: integer
    Priority:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Resolution:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Attachment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        size:
          type: integer
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
    SharedFile:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        dir:
          type: string
        name:
          type: string
        size:
          type: integer
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          $ref: '#/components/schemas/User'
        updated:
          type: string
    Star:
      type: object
      properties:
        id:
          type: integer
        comment:
          type: string
          nullable: true
        url:
          type: string
        title:
          type: string
        presenter:
          $ref: '#/components/schemas/User'
        created:
          type: string
    Issue:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        issueKey:
          type: string
        keyId:
          type: integer
        issueType:
          $ref: '#/components/schemas/IssueType'
        summary:
          type: string
        description:
          type: string
        resolution:
          allOf:
          - $ref: '#/components/schemas/Resolution'
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/Status'
        assignee:
          allOf:
          - $ref: '#/components/schemas/User'
          nullable: true
        category:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Version'
        milestone:
          type: array
          items:
            $ref: '#/components/schemas/Version'
        startDate:
          type: string
          nullable: true
        dueDate:
          type: string
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        actualHours:
          type: number
          nullable: true
        parentIssueId:
          type: integer
          nullable: true
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          $ref: '#/components/schemas/User'
        updated:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        sharedFiles:
          type: array
          items:
            $ref: '#/components/schemas/SharedFile'
        stars:
          type: array
          items:
            $ref: '#/components/schemas/Star'
    Comment:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        changeLog:
          type: array
          items:
            $ref: '#/components/schemas/ChangeLog'
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updated:
          type: string
          nullable: true
        stars:
          type: array
          items:
            $ref: '#/components/schemas/Star'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
    ChangeLog:
      type: object
      properties:
        field:
          type: string
        newValue:
          type: string
          nullable: true
        originalValue:
          type: string
          nullable: true
    Notification:
      type: object
      properties:
        id:
          type: integer
        alreadyRead:
          type: boolean
        reason:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        resourceAlreadyRead:
          type: boolean
    Wiki:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/WikiTag'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        sharedFiles:
          type: array
          items:
            $ref: '#/components/schemas/SharedFile'
        stars:
          type: array
          items:
            $ref: '#/components/schemas/Star'
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          $ref: '#/components/schemas/User'
        updated:
          type: string
          nullable: true
    WikiTag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Repository:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        hookUrl:
          type: string
          nullable: true
        httpUrl:
          type: string
        sshUrl:
          type: string
        displayOrder:
          type: integer
        pushedAt:
          type: string
          nullable: true
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          $ref: '#/components/schemas/User'
        updated:
          type: string
    PullRequest:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        repositoryId:
          type: integer
        number:
          type: integer
        summary:
          type: string
        description:
          type: string
        base:
          type: string
        branch:
          type: string
        status:
          $ref: '#/components/schemas/PRStatus'
        assignee:
          $ref: '#/components/schemas/User'
        issue:
          $ref: '#/components/schemas/Issue'
        baseCommit:
          type: string
        branchCommit:
          type: string
        closeAt:
          type: string
          nullable: true
        mergeAt:
          type: string
          nullable: true
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          $ref: '#/components/schemas/User'
        updated:
          type: string
    PRStatus:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Space:
      type: object
      properties:
        spaceKey:
          type: string
        name:
          type: string
        ownerId:
          type: integer
        lang:
          type: string
        timezone:
          type: string
        reportSendTime:
          type: string
        textFormattingRule:
          type: string
        created:
          type: string
        updated:
          type: string
    CustomField:
      type: object
      properties:
        id:
          type: integer
        typeId:
          type: integer
        name:
          type: string
        description:
          type: string
        required:
          type: boolean
        applicableIssueTypes:
          type: array
          items:
            type: integer
        allowAddItem:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldItem'
    CustomFieldItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        displayOrder:
          type: integer
    DocumentTag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Document:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: integer
        title:
          type: string
        statusId:
          type: integer
        emoji:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTag'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/User'
        updated:
          type: string
          nullable: true
    DocumentDetail:
      allOf:
      - $ref: '#/components/schemas/Document'
      - type: object
        properties:
          plain:
            type: string
            nullable: true
          json:
            type: string
            nullable: true
    DocumentTreeNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTreeNode'
    DocumentTree:
      type: object
      properties:
        projectId:
          type: integer
        activeTree:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/DocumentTreeNode'
        trashTree:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/DocumentTreeNode'
    DocumentComment:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: string
        statusId:
          type: integer
        content:
          type: string
          nullable: true
        plain:
          type: string
          nullable: true
        commentType:
          type: string
          nullable: true
        createdUser:
          $ref: '#/components/schemas/User'
        created:
          type: string
        updatedUser:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/User'
        updated:
          type: string
          nullable: true
security:
- OAuth2: []
- ApiKey: []
paths:
  /activities/{activityId}:
    get:
      operationId: getActivity
      summary: アクティビティの取得
      description: アクティビティの詳細を返します。
      parameters:
      - name: activityId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents:
    get:
      operationId: getDocumentList
      summary: ドキュメント一覧の取得
      description: "ドキュメントページの一覧を取得します。 \nAPIを実行するユーザーが参加しているプロジェクトのドキュメントのみ取得できます。\
        \ \n projectId[] パラメーターで指定したプロジェクトに参加していない場合、そのプロジェクトのドキュメントは取得結果に含まれません。"
      parameters:
      - name: projectId(複数指定可)[]
        in: query
        schema:
          type: array
          items:
            type: string
        description: プロジェクトのID。 プロジェクトのIDは プロジェクトの状態一覧の取得 から取得できます。
      - name: keyword
        in: query
        schema:
          type: string
        description: 検索キーワード
      - name: sort
        in: query
        schema:
          type: string
        description: created updated
      - name: order
        in: query
        schema:
          type: string
        description: '一覧の並び順。指定が無い場合はdescが使われます。 asc: 昇順 desc: 降順'
      - name: offset(必須)
        in: query
        schema:
          type: string
        required: true
        description: 取得開始位置。0以上の整数を指定してください。
      - name: count
        in: query
        schema:
          type: string
        description: 件数の上限。1〜100の範囲で指定してください。指定が無い場合は20が使われます。
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
    post:
      operationId: addDocument
      summary: ドキュメントの追加
      description: "ドキュメントを追加します。 \nAPIを実行するユーザーは、指定したプロジェクトに参加している必要があります。 \n参加していないプロジェクトを指定した場合、エラーが返されます。"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                projectId(必須):
                  type: string
                  description: プロジェクトのID。 プロジェクトのIDは プロジェクトの状態一覧の取得 から取得できます。
                title:
                  type: string
                  description: ドキュメントのタイトル。
                content:
                  type: string
                  description: ドキュメントの内容。Markdown形式で記述できます。
                emoji:
                  type: string
                  description: ドキュメントタイトル横に表示される絵文字。
                parentId:
                  type: string
                  description: 親ドキュメントのID。このIDを指定した場合、ドキュメントはツリー上でparentIdのドキュメントの子として作成されます。
                addLast:
                  type: boolean
                  description: trueにした場合、ドキュメントはツリー上の兄弟ドキュメントの中で末尾に作成されます。デフォルトはfalseで先頭に追加されます。
              required:
              - projectId(必須)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/count:
    get:
      operationId: countDocument
      summary: ドキュメント数の取得
      description: "プロジェクト内のドキュメントの数を取得します。 \nAPIを実行するユーザーは、指定したプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトを指定した場合、エラーが返されます。"
      parameters:
      - name: projectIdOrKey(必須)
        in: query
        schema:
          type: string
        required: true
        description: プロジェクトのID またはプロジェクトキー
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/tree:
    get:
      operationId: getDocumentTree
      summary: ドキュメントツリーの取得
      description: "ドキュメントツリーを取得します。 \nAPIを実行するユーザーは、指定したプロジェクトに参加している必要があります。 \n\
        参加していないプロジェクトを指定した場合、エラーが返されます。"
      parameters:
      - name: projectIdOrKey(必須)
        in: query
        schema:
          type: string
        required: true
        description: プロジェクトのID または プロジェクトキー
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/{documentId}:
    get:
      operationId: getDocument
      summary: ドキュメント情報の取得
      description: "ドキュメントページの情報を取得します。 \nAPIを実行するユーザーは、対象のドキュメントが属するプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトのドキュメントを指定した場合、エラーが返されます。"
      parameters:
      - name: documentId(必須)
        in: path
        required: true
        schema:
          type: string
        description: ドキュメントのID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
    delete:
      operationId: deleteDocument
      summary: ドキュメントの削除
      description: "ドキュメントを削除します。 \nAPIを実行するユーザーは、対象のドキュメントが属するプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトのドキュメントを指定した場合、エラーが返されます。"
      parameters:
      - name: documentId(必須)
        in: path
        required: true
        schema:
          type: string
        description: ドキュメントのID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/{documentId}/attachments/{attachmentId}:
    get:
      operationId: getDocumentAttachments
      summary: ドキュメント添付ファイルの取得
      description: ドキュメントの添付ファイルをダウンロードします。
      parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/{documentId}/comments:
    get:
      operationId: getDocumentComment
      summary: ドキュメントコメントの取得
      description: "ドキュメントのコメントの一覧を取得します。 \nAPIを実行するユーザーは、対象のドキュメントが属するプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトのドキュメントを指定した場合、エラーが返されます。"
      parameters:
      - name: documentId(必須)
        in: path
        required: true
        schema:
          type: string
        description: ドキュメントのID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
  /documents/{documentId}/tags:
    post:
      operationId: addDocumentTag
      summary: ドキュメントタグの追加
      description: "ドキュメントにタグを追加します。 \nAPIを実行するユーザーは、対象のドキュメントが属するプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトのドキュメントを指定した場合、エラーが返されます。"
      parameters:
      - name: documentId(必須)
        in: path
        required: true
        schema:
          type: string
        description: ドキュメントのID
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                tagNames(複数指定可):
                  type: array
                  items:
                    type: string
                  description: 追加するタグ名
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
    delete:
      operationId: removeDocumentTag
      summary: ドキュメントタグの削除
      description: "ドキュメントからタグを削除します。 \nAPIを実行するユーザーは、対象のドキュメントが属するプロジェクトに参加している必要があります。\
        \ \n参加していないプロジェクトのドキュメントを指定した場合、エラーが返されます。"
      parameters:
      - name: documentId(必須)
        in: path
        required: true
        schema:
          type: string
        description: ドキュメントのID
      - name: tagNames(複数指定可)[]
        in: query
        schema:
          type: array
          items:
            type: string
        description: 削除するタグ名
      responses:
        '204':
          description: Successful response
          content:
            application/json:
              schema: {}
  /issues:
    post:
      operationId: addIssue
      summary: 課題の追加
      description: "参加しているプロジェクトに新しい課題を追加します。 \n新しい課題を子課題として追加する場合は、 parentIssueId\
        \ に親課題のIDを指定してください。 \n自分が参加しているプロジェクトの一覧は プロジェクトの状態一覧の取得 から取得できます。"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                projectId:
                  type: integer
                  description: 課題を登録するプロジェクトのID。 プロジェクトのIDは プロジェクトの状態一覧の取得 から取得できます。
                summary:
                  type: string
                  description: 課題の件名
                parentIssueId:
                  type: integer
                  description: 課題の親課題のID。 課題のIDは 課題情報の取得 から取得できます。
                description:
                  type: string
                  description: 課題の詳細
                startDate:
                  type: string
                  description: 課題の開始日 (yyyy-MM-dd)
                dueDate:
                  type: string
                  description: 課題の期限日 (yyyy-MM-dd)
                estimatedHours:
                  type: integer
                  description: 課題の予定時間
                actualHours:
                  type: integer
                  description: 課題の実績時間
                issueTypeId:
                  type: integer
                  description: 課題の種別のID。 課題種別のIDは 種別一覧の取得 から取得できます。
                categoryId:
                  type: array
                  items:
                    type: integer
                  description: 課題のカテゴリーのID。 カテゴリーのIDは カテゴリー一覧の取得 から取得できます。
                versionId:
                  type: array
                  items:
                    type: integer
                  description: 課題のバージョンのID。 バージョンのIDは バージョン(マイルストーン)一覧の取得 から取得できます。
                milestoneId:
                  type: array
                  items:
                    type: integer
                  description: 課題のマイルストーンのID。 マイルストーンのIDは バージョン(マイルストーン)一覧の取得 から取得できます。
                priorityId:
                  type: integer
                  description: 課題の優先度のID。 優先度のIDは 優先度一覧の取得 から取得できます。
