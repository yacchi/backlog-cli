# ================================================
# Backlog CLI Configuration Defaults
# ================================================
# このファイルには全ての設定項目のデフォルト値が含まれます。
# コード内での定数定義は原則禁止とし、このファイルでデフォルト値を管理します。

# ================================================
# プロファイル設定
# ================================================
# プロファイルは複数の環境設定を切り替えるために使用します。
# デフォルトプロファイル以外のプロファイルで未設定の項目はdefaultから継承されます。
profile:
  default:
    # 中継サーバーのURL (OAuth認証に使用)
    # 環境変数: BACKLOG_RELAY_SERVER
    relay_server: ""

    # Backlogスペース名 (例: mycompany)
    # 環境変数: BACKLOG_SPACE
    space: ""

    # Backlogドメイン (backlog.jp または backlog.com)
    # 環境変数: BACKLOG_DOMAIN
    domain: "backlog.jp"

    # デフォルトのプロジェクトキー (例: PROJ)
    # 環境変数: BACKLOG_PROJECT
    project: ""

    # 出力形式 (table, json)
    # 環境変数: BACKLOG_OUTPUT
    output: "table"

    # カラー出力 (auto, always, never)
    # 環境変数: BACKLOG_COLOR
    color: "auto"

    # 使用するエディタ (未設定時は$EDITORまたはvi)
    # 環境変数: BACKLOG_EDITOR
    editor: ""

    # 使用するブラウザ (未設定時はシステムデフォルト)
    # 環境変数: BACKLOG_BROWSER
    browser: ""

    # OAuth認証コールバック用ポート (0 = 自動選択)
    # 環境変数: BACKLOG_CALLBACK_PORT
    auth_callback_port: 0

    # 認証タイムアウト (秒)
    # 環境変数: BACKLOG_AUTH_TIMEOUT
    auth_timeout: 120

    # ブラウザを自動で開かない
    # 環境変数: BACKLOG_NO_BROWSER
    auth_no_browser: false

    # HTTPリクエストタイムアウト (秒)
    http_timeout: 30

    # トークン更新のマージン (秒)
    # 有効期限のこの秒数前に自動更新する
    http_token_refresh_margin: 300

# ================================================
# プロジェクト設定 (.backlog.yamlの代替)
# ================================================
# この設定はリポジトリルートの .backlog.yaml で上書きできます。
project:
  # 使用するプロファイル名 (未設定時は"default")
  profile: ""
  # Backlogスペース名（プロファイル設定を上書き）
  # 環境変数: BACKLOG_PROJECT_SPACE
  space: ""
  # Backlogドメイン（プロファイル設定を上書き）
  # 環境変数: BACKLOG_PROJECT_DOMAIN
  domain: ""
  # プロジェクトキー
  name: ""

# ================================================
# クライアント信頼設定
# ================================================
client:
  trust:
    bundles: []

# ================================================
# サーバー設定 (中継サーバー用)
# ================================================
server:
  # バインドするホスト
  # 環境変数: BACKLOG_SERVER_HOST
  host: "0.0.0.0"

  # リッスンするポート
  # 環境変数: BACKLOG_SERVER_PORT
  port: 8080

  # 外部からアクセス可能なベースURL (リダイレクトURIに使用)
  # 環境変数: BACKLOG_SERVER_BASE_URL
  # 例: https://relay.example.com
  base_url: ""

  # 許可するホストパターン（セミコロン区切り、ワイルドカード対応）
  # 環境変数: BACKLOG_ALLOWED_HOST_PATTERNS
  # base_url未設定時、Hostヘッダーからコールバック URL を構築する際の検証に使用
  # 空の場合は全てのホストを許可（開発用）
  # 例: "*.lambda-url.*.on.aws;*.run.app"
  allowed_host_patterns: ""

  # HTTPサーバータイムアウト設定
  http:
    # 読み取りタイムアウト (秒)
    read_timeout: 10
    # 書き込みタイムアウト (秒)
    write_timeout: 30
    # アイドルタイムアウト (秒)
    idle_timeout: 60

  # Backlogアプリケーション設定 (OAuth Client ID/Secret)
  # キーは識別子（環境変数のキーにドットや大文字小文字混在を避けるため）
  backlog:
    jp:
      domain: "backlog.jp"
      client_id: ""      # 環境変数: BACKLOG_CLIENT_ID_JP
      client_secret: ""  # 環境変数: BACKLOG_CLIENT_SECRET_JP
    com:
      domain: "backlog.com"
      client_id: ""      # 環境変数: BACKLOG_CLIENT_ID_COM
      client_secret: ""  # 環境変数: BACKLOG_CLIENT_SECRET_COM

  # テナント設定
  tenants: {}

  # アクセス制御
  access_control:
    # 許可するスペース (空 = 全て許可)
    # 環境変数: BACKLOG_ALLOWED_SPACES (カンマ区切り)
    allowed_spaces: []

    # 許可するプロジェクト (空 = 全て許可)
    # 環境変数: BACKLOG_ALLOWED_PROJECTS (カンマ区切り)
    allowed_projects: []

    # 許可するIP/CIDRレンジ (空 = 全て許可)
    # 環境変数: BACKLOG_ALLOWED_CIDRS (カンマ区切り)
    # 例: ["192.168.0.0/16", "10.0.0.0/8"]
    allowed_cidrs: []

  # レートリミット設定
  rate_limit:
    # レートリミットを有効化
    enabled: false
    # 1分あたりのリクエスト上限
    requests_per_minute: 60
    # バースト許容数
    burst: 10
    # クリーンアップ間隔 (分)
    cleanup_interval: 5
    # エントリ有効期限 (分)
    entry_ttl: 10

  # 監査ログ設定
  audit:
    # 監査ログを有効化
    # 環境変数: BACKLOG_AUDIT_ENABLED
    enabled: true

    # 出力先 (stdout, stderr, file, webhook)
    # 環境変数: BACKLOG_AUDIT_OUTPUT
    output: "stdout"

    # ファイル出力時のパス
    # 環境変数: BACKLOG_AUDIT_FILE_PATH
    file_path: ""

    # Webhook URL (Slack互換形式)
    # 環境変数: BACKLOG_AUDIT_WEBHOOK_URL
    webhook_url: ""

    # Webhookタイムアウト (秒)
    webhook_timeout: 10

  # JWT設定
  jwt:
    # JWTトークン有効期限 (秒)
    expiry: 300

  # HTTP キャッシュ設定
  cache:
    # 短期キャッシュ TTL (秒) - info等の動的コンテンツ向け
    # 環境変数: BACKLOG_SERVER_CACHE_SHORT_TTL
    short_ttl: 300

    # 長期キャッシュ TTL (秒) - certs等の準静的コンテンツ向け
    # 環境変数: BACKLOG_SERVER_CACHE_LONG_TTL
    long_ttl: 3600

    # 静的アセット TTL (秒) - immutableなアセット向け
    # 環境変数: BACKLOG_SERVER_CACHE_STATIC_TTL
    static_ttl: 31536000

# ================================================
# 表示設定
# ================================================
display:
  # テーブル表示時のサマリ最大文字数
  summary_max_length: 50

  # 要約に使用するコメント数 (0で無効)
  summary_comment_count: 100

  # コメント表示数のデフォルト
  default_comment_count: 10

  # 課題一覧のデフォルト表示件数
  default_issue_limit: 20

  # 表示用タイムゾーン (IANAタイムゾーン名)
  # 例: "Asia/Tokyo", "America/New_York", "UTC"
  # 空の場合はシステムのローカルタイムゾーンを使用
  timezone: ""

  # 日付フォーマット (Goのtime.Format形式)
  # 例: "2006-01-02", "2006/01/02", "Jan 02, 2006"
  date_format: "2006-01-02"

  # 日時フォーマット (Goのtime.Format形式)
  # 例: "2006-01-02 15:04:05", "Jan 02, 2006 15:04"
  datetime_format: "2006-01-02 15:04"

  # ターミナルハイパーリンク (OSC 8)
  # true の場合、課題キーやPR番号をクリック可能なリンクとして表示
  # 対応ターミナル: iTerm2, Windows Terminal, GNOME Terminal (3.26+), Konsole (18.07+), foot など
  hyperlink: true

  # Backlog記法→GFM表示変換
  markdown_view: false
  markdown_warn: true
  markdown_cache: false
  markdown_cache_raw: false
  markdown_cache_excerpt: 200

  # Markdown変換ルール一覧 (internal/markdown/types.go RuleID)
  # - heading_asterisk: *見出し → # 見出し
  # - quote_block: {quote} → >
  # - code_block: {code} → ```
  # - emphasis_bold: ''bold'' → **bold**
  # - emphasis_italic: '''italic''' → *italic*
  # - strikethrough: %%strike%% → ~~strike~~
  # - backlog_link: [[label>url]] → [label](url)
  # - toc: #contents → [toc]
  # - line_break: &br; → <br>
  # - list_plus: + list → 1. list
  # - list_dash_space: -list/--nested → インデント/空行補正
  # - table_separator: |h などのテーブル補正
  # - image_macro: #image(...) → ![image](...)

  # 常に変換を掛けることが安全ではないルール
  markdown_unsafe_rules:
    - heading_asterisk
    - list_plus
    - list_dash_space
    - table_separator
    - emphasis_bold
    - emphasis_italic
    - strikethrough

  # 課題一覧の表示フィールド
  # 利用可能: key, status, priority, assignee, summary, type, created, updated,
  #          created_user, due_date, start_date, category, milestone, version, url
  issue_list_fields:
    - key
    - status
    - priority
    - assignee
    - due_date
    - summary

  # 課題一覧のフィールド設定
  # header: ヘッダー表示名
  # max_width: 最大表示幅（0 = 無制限、truncateに使用）
  issue_field_config:
    key:
      header: "KEY"
    status:
      header: "STATUS"
    priority:
      header: "PRIORITY"
    assignee:
      header: "ASSIGNEE"
      max_width: 20
    summary:
      header: "SUMMARY"
      max_width: 50
    type:
      header: "TYPE"
    created:
      header: "CREATED"
    updated:
      header: "UPDATED"
    created_user:
      header: "CREATED BY"
      max_width: 20
    due_date:
      header: "DUE DATE"
    start_date:
      header: "START DATE"
    category:
      header: "CATEGORY"
      max_width: 30
    milestone:
      header: "MILESTONE"
      max_width: 30
    version:
      header: "VERSION"
      max_width: 20
    url:
      header: "URL"

  # PR一覧の表示フィールド
  # 利用可能: number, status, author, branch, summary, base, created, updated, url
  pr_list_fields:
    - number
    - status
    - author
    - branch
    - summary

  # PR一覧のフィールド設定
  # header: ヘッダー表示名
  # max_width: 最大表示幅（0 = 無制限、truncateに使用）
  pr_field_config:
    number:
      header: "#"
    status:
      header: "STATUS"
    author:
      header: "AUTHOR"
      max_width: 20
    branch:
      header: "BRANCH"
      max_width: 30
    summary:
      header: "SUMMARY"
      max_width: 40
    base:
      header: "BASE"
      max_width: 30
    created:
      header: "CREATED"
    updated:
      header: "UPDATED"
    url:
      header: "URL"

# ================================================
# 認証設定
# ================================================
auth:
  # 認証情報の保存先
  # auto: keyring が利用できれば keyring、そうでなければ credentials.yaml
  # file: credentials.yaml に保存
  # keyring: secret 値のみを OS keyring に保存
  credential_backend: auto

  # コールバックサーバーの許可ポート範囲
  min_callback_port: 1024
  max_callback_port: 65535

  # セッション設定
  session:
    # セッションチェック間隔 (秒)
    check_interval: 1

    # セッション有効期限 (秒)
    timeout: 300

  # Keepalive設定 (ローカル認証サーバー用)
  keepalive:
    # 状態チェック間隔 (秒)
    # 認証状態の変更をクライアントに通知する間隔
    interval: 3

    # 応答タイムアウト (秒)
    timeout: 5

    # 接続待機タイムアウト (秒)
    connect_timeout: 30

    # 切断後の猶予期間 (秒)
    # この期間内に再接続があればタイムアウトしない
    grace_period: 10

# ================================================
# キャッシュ設定
# ================================================
cache:
  # キャッシュを有効化
  # 環境変数: BACKLOG_CACHE_ENABLED
  enabled: true

  # キャッシュディレクトリ (空の場合はシステムのユーザーキャッシュディレクトリを使用)
  # 環境変数: BACKLOG_CACHE_DIR
  dir: ""

  # キャッシュ有効期限 (秒)
  # 環境変数: BACKLOG_CACHE_TTL
  ttl: 300

# ================================================
# AI要約設定
# ================================================
ai_summary:
  # AI要約を有効化
  # 環境変数: BACKLOG_AI_SUMMARY_ENABLED
  enabled: true

  # 使用するプロバイダー名
  # 環境変数: BACKLOG_AI_SUMMARY_PROVIDER
  provider: claude

  # タイムアウト（秒）
  # 環境変数: BACKLOG_AI_SUMMARY_TIMEOUT
  timeout: 60

  # 1回のAI呼び出しで処理する課題数
  # 大量の課題を要約する際にタイムアウトを防ぐため、バッチに分割して処理
  # 環境変数: BACKLOG_AI_SUMMARY_BATCH_SIZE
  batch_size: 5

  # 同時実行数の上限
  # 複数バッチを並列で処理する際の最大同時実行数
  # 環境変数: BACKLOG_AI_SUMMARY_CONCURRENCY
  concurrency: 3

  # リトライ回数
  # 要約取得に失敗した課題をリトライする回数
  # 環境変数: BACKLOG_AI_SUMMARY_RETRY_COUNT
  retry_count: 2

  # リトライ間隔（秒）
  # リトライ前に待機する時間
  # 環境変数: BACKLOG_AI_SUMMARY_RETRY_DELAY
  retry_delay: 1

  # プロバイダー定義
  # 各プロバイダーでbatch_size/concurrencyを個別設定可能
  # 未設定の場合はグローバルデフォルト（上記）を使用
  providers:
    claude-opus:
      command: "claude"
      args: ["-p", "--model", "opus", "--dangerously-skip-permissions", "--no-session-persistence"]
      use_stdin: true
      use_stdout: true
    claude:
      command: "claude"
      args: ["-p", "--model", "haiku", "--no-session-persistence"]
      use_stdin: true
      use_stdout: true
      # Haikuは高速
      batch_size: 10
      concurrency: 3
    gemini:
      command: "gemini"
      args: ["-y"]  # YOLOモードで自動承認
      use_stdin: true
      use_stdout: true
    codex:
      command: "codex"
      args: ["exec", "-", "--model", "gpt-5.2"]  # stdin から読み込み
      use_stdin: true
      use_stdout: true
    copilot:
      command: "copilot"
      args: ["-p", "", "-s", "--model", "gpt-4.1", "--no-auto-update"]
      use_stdin: true
      use_stdout: true

  # プロンプトテンプレート
  prompts:
    # 課題一覧用（1行要約）
    issue_list: |
      以下の課題一覧を要約してください。
      各課題につき1行（50文字以内）で要点をまとめてください。
      タイトルに対して補完的な情報を提供するようにしてください。

      出力形式:
      === 課題キー ===
      要約文

    # 課題詳細用（複数行要約）
    issue_view: |
      以下の課題を3文程度で要約してください。
      背景、現状、次のアクションが分かるように、タイトルに対して補完的な情報を提供するようにしてください。

      出力形式:
      === 課題キー ===
      要約文（複数行可）

  # プロンプト最適化設定
  optimization:
    # 評価モデルプロバイダー（評価・課題選定・改善提案を担当）
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_EVALUATION_PROVIDER
    evaluation_provider: claude-opus

    # 終了条件のスコア閾値 (1-10)
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_SCORE_THRESHOLD
    score_threshold: 9

    # 最大反復回数
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_MAX_ITERATIONS
    max_iterations: 5

    # 評価モデルのタイムアウト（秒）
    # 評価・改善タスクは複雑なため、通常の要約より長い時間が必要
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_EVALUATION_TIMEOUT
    evaluation_timeout: 300

    # 候補課題の取得件数（最大100件、評価モデルがここから選定）
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_CANDIDATE_COUNT
    candidate_count: 100

    # 実際に評価に使用する課題数（候補から評価モデルが選定）
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_SAMPLE_COUNT
    sample_count: 5

    # 課題選定の対象プロジェクト（空の場合は全プロジェクトから選定）
    # 複数指定可能
    # 環境変数: BACKLOG_AI_SUMMARY_OPTIMIZATION_TARGET_PROJECTS（カンマ区切り）
    target_projects: []

    # 出力モデル情報テンプレート（評価モデルへのコンテキスト提供用）
    output_model_context: |
      出力モデル: {provider_name}
      コマンド: {command} {args}

    # プロンプトエンジニアリングのヒント
    # 評価モデルがプロンプト改善時に参照するモデル固有の知識
    # Web検索では得られない内部知識やベストプラクティスを記述
    prompt_engineering_tips: |
      ## モデル固有のヒント

      ### Claude系モデル
      - XMLタグ（<task>, <input>, <output>, <example>等）を使用すると構造化された出力が得られやすい
      - システムプロンプトで役割を明確に定義する
      - 「まず〜を行い、次に〜」のように段階的な指示が効果的

      ### GPT系モデル
      - Markdown形式の構造化が効果的
      - Few-shot例を含めると精度向上
      - JSON出力を求める場合はスキーマを明示

      ### Gemini系モデル
      - 明確な出力形式の指定が重要
      - コンテキストは簡潔に保つ

      ## 一般的なベストプラクティス
      - 出力形式を具体例で示す
      - 制約条件（文字数、行数等）を明確に
      - 曖昧な表現を避ける
